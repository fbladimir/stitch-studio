<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="#B36050"/>

  <!-- Hoop outer ring (wooden frame) -->
  <circle cx="256" cy="264" r="186" fill="none" stroke="#F5E6D8" stroke-width="42"/>

  <!-- Inner ring highlight -->
  <circle cx="256" cy="264" r="165" fill="none" stroke="#D4A090" stroke-width="3"/>

  <!-- Linen fabric fill inside hoop -->
  <circle cx="256" cy="264" r="162" fill="#FDF4F1"/>

  <!-- Subtle grid dots (aida cloth look) -->
  <g fill="#E8D8CC" opacity="0.7">
    <circle cx="216" cy="224" r="3"/><circle cx="256" cy="224" r="3"/><circle cx="296" cy="224" r="3"/>
    <circle cx="216" cy="264" r="3"/><circle cx="256" cy="264" r="3"/><circle cx="296" cy="264" r="3"/>
    <circle cx="216" cy="304" r="3"/><circle cx="256" cy="304" r="3"/><circle cx="296" cy="304" r="3"/>
  </g>

  <!-- Large center cross-stitch X -->
  <line x1="206" y1="214" x2="306" y2="314" stroke="#B36050" stroke-width="20" stroke-linecap="round"/>
  <line x1="306" y1="214" x2="206" y2="314" stroke="#B36050" stroke-width="20" stroke-linecap="round"/>

  <!-- Small X — top-left, sage -->
  <line x1="200" y1="234" x2="216" y2="250" stroke="#5F7A63" stroke-width="11" stroke-linecap="round"/>
  <line x1="216" y1="234" x2="200" y2="250" stroke="#5F7A63" stroke-width="11" stroke-linecap="round"/>

  <!-- Small X — top-right, sage -->
  <line x1="296" y1="234" x2="312" y2="250" stroke="#5F7A63" stroke-width="11" stroke-linecap="round"/>
  <line x1="312" y1="234" x2="296" y2="250" stroke="#5F7A63" stroke-width="11" stroke-linecap="round"/>

  <!-- Small X — bottom-left, gold -->
  <line x1="200" y1="278" x2="216" y2="294" stroke="#AE7C2A" stroke-width="11" stroke-linecap="round"/>
  <line x1="216" y1="278" x2="200" y2="294" stroke="#AE7C2A" stroke-width="11" stroke-linecap="round"/>

  <!-- Small X — bottom-right, gold -->
  <line x1="296" y1="278" x2="312" y2="294" stroke="#AE7C2A" stroke-width="11" stroke-linecap="round"/>
  <line x1="312" y1="278" x2="296" y2="294" stroke="#AE7C2A" stroke-width="11" stroke-linecap="round"/>

  <!-- Hoop clasp/screw at top -->
  <rect x="232" y="66" width="48" height="26" rx="13" fill="#F5E6D8"/>
  <rect x="238" y="72" width="36" height="14" rx="7" fill="#DCC8B8"/>
  <circle cx="256" cy="79" r="4" fill="#C4A898"/>
</svg>
